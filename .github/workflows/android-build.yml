name: Build Android APK/AAB

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Opt into Node.js 24 now to avoid forced migration warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        # Install both cli and core so @bubblewrap/core lands in npm root -g
        # and is resolvable via NODE_PATH without nested-module lookup.
        run: npm install -g @bubblewrap/cli @bubblewrap/core

      # Pre-seed ~/.bubblewrap/config.json so `bubblewrap init` never prompts
      # "Local Android Development Environment not found. Set it up? [y/N]".
      # GitHub Actions runners ship with ANDROID_SDK_ROOT and JAVA_HOME set.
      - name: Pre-configure Bubblewrap SDK paths (prevents interactive prompt)
        run: |
          mkdir -p ~/.bubblewrap
          # Use jq for safe JSON encoding in case paths contain special chars
          jq -n \
            --arg jdk  "$JAVA_HOME" \
            --arg sdk  "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" \
            '{"jdkPath":$jdk,"androidSdkPath":$sdk}' \
            > ~/.bubblewrap/config.json
          echo "=== Bubblewrap config ==="
          cat ~/.bubblewrap/config.json
          echo "=== Path check ==="
          test -f "$JAVA_HOME/bin/java"   && echo "JDK OK"   || echo "JDK MISSING: $JAVA_HOME"
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          test -d "$SDK"                  && echo "SDK OK"   || echo "SDK MISSING: $SDK"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install required SDK build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      # Gradle calls `git describe` for versioning inside android-build/.
      # Without this, git exits 128 ("unsafe directory") on GH Actions.
      - name: Allow git in all directories (prevents Gradle git exit 128)
        run: git config --global --add safe.directory '*'

      - name: Restore signing keystore
        run: |
          mkdir -p android-signing
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-signing/ternakos.keystore
          BYTES=$(wc -c < android-signing/ternakos.keystore)
          echo "Keystore restored: $BYTES bytes"
          if [ "$BYTES" -lt 100 ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is empty or invalid (got $BYTES bytes)."
            echo "Set KEYSTORE_BASE64 in repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Generate Android project via @bubblewrap/core API (non-interactive)
        # bubblewrap init CLI uses inquirer which needs a real TTY — any attempt to
        # drive it non-interactively (piped stdin, expect) exits 130.
        # @bubblewrap/core exposes the same generator as a plain Node.js API with
        # no interactive prompts at all. We call it directly here.
        run: |
          export NODE_PATH="$(npm root -g)"
          node - << 'ENDSCRIPT'
          'use strict';
          const path = require('path');
          const fs   = require('fs');
          const { TwaGenerator, TwaManifest, Config } = require('@bubblewrap/core');
          (async () => {
            const jdkPath = process.env.JAVA_HOME;
            const sdkPath = process.env.ANDROID_SDK_ROOT || '/usr/local/lib/android/sdk';
            if (!jdkPath) throw new Error('JAVA_HOME is not set');
            console.log('JDK:', jdkPath);
            console.log('SDK:', sdkPath);

            const config = new Config(jdkPath, sdkPath);

            // Prefer fromFile so all settings in twa-manifest.json (packageId,
            // fingerprints, colors) are preserved exactly as committed.
            let manifest;
            if (typeof TwaManifest.fromFile === 'function') {
              manifest = await TwaManifest.fromFile(path.resolve('./twa-manifest.json'));
              console.log('Manifest loaded from twa-manifest.json (fromFile)');
            } else {
              const json = JSON.parse(fs.readFileSync('./twa-manifest.json', 'utf8'));
              manifest = new TwaManifest(json);
              console.log('Manifest loaded from twa-manifest.json (constructor)');
            }

            await new TwaGenerator().createTwaProject(
              path.resolve('./android-build'),
              manifest,
              config
            );
            console.log('android-build generated OK');
          })().catch(err => {
            console.error('FAILED:', err.stack || err.message || err);
            process.exit(1);
          });
          ENDSCRIPT
          # Verify directory was actually created
          test -d android-build || (echo "ERROR: android-build not created" && exit 1)
          echo "=== android-build top-level ===" && ls android-build/

      - name: Build APK + AAB
        # Run Gradle directly instead of `bubblewrap build` to avoid any
        # interactive prompts from the CLI wrapper.
        # android.injected.signing.* are the standard Gradle signing props.
        run: |
          cd android-build
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../android-signing/ternakos.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Locate build outputs
        run: |
          echo "=== APK files ==="
          find android-build -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== AAB files ==="
          find android-build -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ternakos-apk-${{ github.run_number }}
          path: android-build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: ternakos-aab-${{ github.run_number }}
          path: android-build/**/*.aab
          if-no-files-found: warn
          retention-days: 30
