name: Build Android APK/AAB

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Opt into Node.js 24 now to avoid forced migration warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Pre-seed ~/.bubblewrap/config.json so `bubblewrap init` never prompts
      # "Local Android Development Environment not found. Set it up? [y/N]".
      # GitHub Actions runners ship with ANDROID_SDK_ROOT and JAVA_HOME set.
      - name: Pre-configure Bubblewrap SDK paths (prevents interactive prompt)
        run: |
          mkdir -p ~/.bubblewrap
          # Use jq for safe JSON encoding in case paths contain special chars
          jq -n \
            --arg jdk  "$JAVA_HOME" \
            --arg sdk  "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" \
            '{"jdkPath":$jdk,"androidSdkPath":$sdk}' \
            > ~/.bubblewrap/config.json
          echo "=== Bubblewrap config ==="
          cat ~/.bubblewrap/config.json
          echo "=== Path check ==="
          test -f "$JAVA_HOME/bin/java"   && echo "JDK OK"   || echo "JDK MISSING: $JAVA_HOME"
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          test -d "$SDK"                  && echo "SDK OK"   || echo "SDK MISSING: $SDK"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install required SDK build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      # Gradle calls `git describe` for versioning inside android-build/.
      # Without this, git exits 128 ("unsafe directory") on GH Actions.
      - name: Allow git in all directories (prevents Gradle git exit 128)
        run: git config --global --add safe.directory '*'

      - name: Restore signing keystore
        run: |
          mkdir -p android-signing
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-signing/ternakos.keystore
          echo "Keystore restored: $(wc -c < android-signing/ternakos.keystore) bytes"

      - name: Initialize Bubblewrap project
        # Pipe empty lines so all confirmation prompts accept their defaults.
        # config.json (above) prevents the "Set up SDK?" prompt; the remaining
        # prompts (app name, package ID, etc.) default to manifest values.
        run: |
          yes "" | bubblewrap init \
            --manifest https://ternakos.my.id/manifest.webmanifest \
            --directory android-build

      - name: Build APK + AAB
        run: |
          cd android-build
          bubblewrap build \
            --keyPath ../android-signing/ternakos.keystore \
            --keyAlias "${{ secrets.KEY_ALIAS }}" \
            --keystorePassword "${{ secrets.KEYSTORE_PASSWORD }}" \
            --keyPassword "${{ secrets.KEY_PASSWORD }}"

      - name: Locate build outputs
        run: |
          echo "=== APK files ==="
          find android-build -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== AAB files ==="
          find android-build -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ternakos-apk-${{ github.run_number }}
          path: android-build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: ternakos-aab-${{ github.run_number }}
          path: android-build/**/*.aab
          if-no-files-found: warn
          retention-days: 30
