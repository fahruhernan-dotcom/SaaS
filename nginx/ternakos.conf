server {
    listen 80;
    server_name ternakos.my.id www.ternakos.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ternakos.my.id www.ternakos.my.id;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ternakos.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ternakos.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── SECURITY HARDENING ──────────────────────────────────────────────────

    # [FIX LOW-3] Sembunyikan versi Nginx dari scanner
    server_tokens off;

    # SECURITY HARDENING
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://www.googletagmanager.com https://prod.spline.design https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://open.bigmodel.cn https://api.maiarouter.ai https://api.maia.id https://prod.spline.design https://*.spline.design https://unpkg.com https://www.google-analytics.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; frame-src 'self' blob:; worker-src 'self' blob:; child-src blob:;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), mircophone=(), geolocation=()" always;

    # ── APP ROOT ────────────────────────────────────────────────────────────
    root /home/ubuntu/ternakos/dist;
    index 200.html index.html;

    # ── SPA Fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /200.html;
    }

    # ── Static assets CACHING ───────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block sensitive paths ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(\.env|\.git|\.htaccess|wp-admin|wp-login|xmlrpc) {
        deny all;
        return 404;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
