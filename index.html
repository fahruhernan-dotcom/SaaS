<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- Security meta tags should be handled via HTTP headers -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/png" href="/logo.png?v=3" />
    <link rel="apple-touch-icon" href="/logo.png?v=3" />
    <link rel="shortcut icon" href="/logo.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <!-- Title akan di-inject per-halaman oleh SEO component (vite-react-ssg) -->
    <meta name="description" content="Kelola kandang, stok pakan, transaksi, laporan, dan performa ternak dalam satu dashboard digital untuk peternak, broker, distributor, dan RPA.">
    <link rel="canonical" href="https://ternakos.my.id/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ternakos.my.id/" />
    <meta property="og:title" content="TernakOS - Aplikasi Manajemen Peternakan" />
    <meta property="og:description" content="Kelola kandang, stok pakan, transaksi, laporan, dan performa ternak dalam satu dashboard digital." />
    <meta property="og:image" content="https://ternakos.my.id/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://ternakos.my.id/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="TernakOS" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ternakos.my.id/" />
    <meta name="twitter:title" content="TernakOS - Aplikasi Manajemen Peternakan" />
    <meta name="twitter:description" content="Kelola kandang, stok pakan, transaksi, laporan, dan performa ternak dalam satu dashboard digital." />
    <meta name="twitter:image" content="https://ternakos.my.id/og-image.jpg" />

    <!-- Schema.org for Sitelinks Search Box / Nested Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Fitur",
          "description": "Fitur lengkap platform TernakOS",
          "url": "https://ternakos.my.id/fitur"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "Harga",
          "description": "Paket langganan TernakOS",
          "url": "https://ternakos.my.id/harga"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Harga Pasar",
          "description": "Informasi harga komoditas terkini",
          "url": "https://ternakos.my.id/harga-pasar"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "Tentang Kami",
          "description": "Profil dan misi TernakOS",
          "url": "https://ternakos.my.id/tentang-kami"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 5,
          "name": "Kebijakan Privasi",
          "description": "Komitmen perlindungan data",
          "url": "https://ternakos.my.id/privacy"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 6,
          "name": "Syarat & Ketentuan",
          "description": "Ketentuan penggunaan layanan",
          "url": "https://ternakos.my.id/terms"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
