<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TernakOS — Tidak Ada Koneksi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #06090F;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin: 0 auto 24px;
      display: block;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #F1F5F9;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #94A3B8;
      margin-bottom: 28px;
    }
    button {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="TernakOS" class="icon" />
    <h1>Koneksi Terputus</h1>
    <p>
      Koneksi internet terputus. Silakan periksa jaringan Anda, lalu coba lagi.<br /><br />
      Data kandang dan transaksi TernakOS memerlukan koneksi aktif.
    </p>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
