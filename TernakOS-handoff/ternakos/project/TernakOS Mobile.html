<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TernakOS — Mobile Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#0A0E0C"/>
      <circle cx="100" cy="100" r="50" fill="oklch(0.72 0.15 155)"/>
      <text x="100" y="115" text-anchor="middle" font-family="system-ui" font-size="44" font-weight="600" fill="#0A0E0C">T</text>
    </svg>
  </template>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Inter", -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 0; height: 0; }

    @keyframes fadeIn   { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeOut  { from { opacity: 1 } to { opacity: 0 } }
    @keyframes slideUp  { from { transform: translateY(100%) } to { transform: translateY(0) } }
    @keyframes slideDown{ from { transform: translateY(0) } to { transform: translateY(100%) } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0.5 } to { transform: translateX(0); opacity: 1 } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="tabs.jsx"></script>
  <script type="text/babel" src="drawer.jsx"></script>
  <script type="text/babel" src="main.jsx"></script>
</body>
</html>
